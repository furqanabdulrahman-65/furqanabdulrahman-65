name: Update GitHub Contribution Heatmap

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch: # Enable manual run

permissions:
  contents: write

jobs:
  update-heatmap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Fetch contribution data
        run: |
          python scripts/fetch_contributions.py

      - name: Render heatmap SVG
        run: |
          python scripts/render_heatmap_svg.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json contrib-heatmap.svg
          # Only commit and push if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "chore: update contribution heatmap data and svg [skip ci]"
            git push
          else
            echo "No changes in contributions heatmap."
          fi
