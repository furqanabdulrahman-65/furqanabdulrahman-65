        <animateTransform attributeName="transform" type="translate" from="0 8" to="0 0" begin="0.73s" dur="0.4s" fill="freeze" />
        
    <text x="25" y="290" font-family="Consolas, monospace" font-size="13" class="key">Location:</text>
    <text x="120" y="290" font-family="Consolas, monospace" font-size="13" class="val">India</text>
  </g>

  <g opacity="0">
    
        <animate attributeName="opacity" from="0" to="1" begin="0.81s" dur="0.4s" fill="freeze" />
        <animateTransform attributeName="transform" type="translate" from="0 8" to="0 0" begin="0.81s" dur="0.4s" fill="freeze" />
        
    <text x="25" y="340" font-family="Consolas, monospace" font-size="13" fill="#8b949e">furqan@terminal:~$ </text>
    <rect x="170" y="327" width="8" height="15" fill="#58a6ff" opacity="0">
      <animate attributeName="opacity" values="0;1;0;1" keyTimes="0;0.5;0.51;1" begin="1.21s" dur="0.8s" repeatCount="indefinite" />
    </rect>
  </g>

</svg>
