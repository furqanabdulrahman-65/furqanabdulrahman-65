        <animateTransform attributeName="transform" type="translate" from="0 8" to="0 0" begin="0.25s" dur="0.4s" fill="freeze" />
        
    <text x="25" y="110" font-family="Consolas, monospace" font-size="13" class="key">User:</text>
    <text x="120" y="110" font-family="Consolas, monospace" font-size="13" class="val">Mohammed Furqan Abdul Rahman</text>
  </g>

  <g opacity="0" transform="translate(0, 0)">
    
        <animate attributeName="opacity" from="0" to="1" begin="0.33s" dur="0.4s" fill="freeze" />
