        <animate attributeName="opacity" from="0" to="1" begin="0.41000000000000003s" dur="0.4s" fill="freeze" />
        <animateTransform attributeName="transform" type="translate" from="0 8" to="0 0" begin="0.41000000000000003s" dur="0.4s" fill="freeze" />
        
    <text x="25" y="170" font-family="Consolas, monospace" font-size="13" class="key">Stack:</text>
    <text x="120" y="170" font-family="Consolas, monospace" font-size="13" class="val">Python | FastAPI | RAG</text>
  </g>

