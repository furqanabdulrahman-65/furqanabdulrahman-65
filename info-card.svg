  </g>

  <g opacity="0" transform="translate(0, 0)">
    
        <animate attributeName="opacity" from="0" to="1" begin="0.41000000000000003s" dur="0.4s" fill="freeze" />
        <animateTransform attributeName="transform" type="translate" from="0 8" to="0 0" begin="0.41000000000000003s" dur="0.4s" fill="freeze" />
        
    <text x="25" y="154" font-family="Consolas, monospace" font-size="13" class="key">Stack:</text>
    <text x="120" y="154" font-family="Consolas, monospace" font-size="13" class="val">Python | FastAPI | RAG</text>
  </g>

  <g opacity="0" transform="translate(0, 0)">
    
        <animate attributeName="opacity" from="0" to="1" begin="0.49s" dur="0.4s" fill="freeze" />
        <animateTransform attributeName="transform" type="translate" from="0 8" to="0 0" begin="0.49s" dur="0.4s" fill="freeze" />
        
    <text x="25" y="176" font-family="Consolas, monospace" font-size="13" class="key">AI:</text>
    <text x="120" y="176" font-family="Consolas, monospace" font-size="13" class="val">LLMs | LangGraph | Multi-Agent</text>
  </g>

  <g opacity="0" transform="translate(0, 0)">
    
        <animate attributeName="opacity" from="0" to="1" begin="0.5700000000000001s" dur="0.4s" fill="freeze" />
        <animateTransform attributeName="transform" type="translate" from="0 8" to="0 0" begin="0.5700000000000001s" dur="0.4s" fill="freeze" />
        
    <text x="25" y="198" font-family="Consolas, monospace" font-size="13" class="key">Cloud:</text>
    <text x="120" y="198" font-family="Consolas, monospace" font-size="13" class="val">Docker | AWS Basics</text>
  </g>

  <g opacity="0" transform="translate(0, 0)">
    
        <animate attributeName="opacity" from="0" to="1" begin="0.65s" dur="0.4s" fill="freeze" />
        <animateTransform attributeName="transform" type="translate" from="0 8" to="0 0" begin="0.65s" dur="0.4s" fill="freeze" />
        
