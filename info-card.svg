<svg xmlns="http://www.w3.org/2000/svg"
     width="490"
     height="280"
     viewBox="0 0 490 280">
  <style>
    .key { font-weight: bold; fill: #58a6ff; }
    .val { fill: #c9d1d9; }
    .title { font-weight: bold; fill: #58a6ff; }
  </style>

  <rect width="100%" height="100%" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1.5" />

  <!-- Terminal Window Title Bar -->
  <g opacity="0" transform="translate(0, 0)">
    
        <animate attributeName="opacity" from="0" to="1" begin="0.05s" dur="0.4s" fill="freeze" />
        <animateTransform attributeName="transform" type="translate" from="0 8" to="0 0" begin="0.05s" dur="0.4s" fill="freeze" />
        
    <!-- Mac / Unix window controls -->
    <circle cx="20" cy="20" r="5" fill="#ff5f56" />
    <circle cx="35" cy="20" r="5" fill="#ffbd2e" />
    <circle cx="50" cy="20" r="5" fill="#27c93f" />
    <text x="245" y="20" font-family="Consolas, monospace" font-size="11" fill="#8b949e" text-anchor="middle" dominant-baseline="middle">furqan@terminal:~</text>
    <line x1="0" y1="36" x2="490" y2="36" stroke="#21262d" stroke-width="1" />
  </g>

  <!-- Title / Logo details -->
  <g opacity="0" transform="translate(0, 0)">
    
        <animate attributeName="opacity" from="0" to="1" begin="0.15s" dur="0.4s" fill="freeze" />
        <animateTransform attributeName="transform" type="translate" from="0 8" to="0 0" begin="0.15s" dur="0.4s" fill="freeze" />
        
    <text x="25" y="62" font-family="Consolas, monospace" font-size="16" class="title">furqan@github</text>
    <text x="25" y="80" font-family="Consolas, monospace" font-size="12" fill="#8b949e">------------------------------</text>
  </g>

  <g opacity="0" transform="translate(0, 0)">
    
        <animate attributeName="opacity" from="0" to="1" begin="0.25s" dur="0.4s" fill="freeze" />
        <animateTransform attributeName="transform" type="translate" from="0 8" to="0 0" begin="0.25s" dur="0.4s" fill="freeze" />
        
    <text x="25" y="110" font-family="Consolas, monospace" font-size="13" class="key">User:</text>
    <text x="120" y="110" font-family="Consolas, monospace" font-size="13" class="val">Mohammed Furqan Abdul Rahman</text>
  </g>

  <g opacity="0" transform="translate(0, 0)">
    
        <animate attributeName="opacity" from="0" to="1" begin="0.33s" dur="0.4s" fill="freeze" />
        <animateTransform attributeName="transform" type="translate" from="0 8" to="0 0" begin="0.33s" dur="0.4s" fill="freeze" />
        
